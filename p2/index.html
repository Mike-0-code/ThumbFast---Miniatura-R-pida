<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ThumbFast - Miniatura Rápida</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #e0e0e0;
        }

        .top-bar {
            background-color: #111111;
            padding: 8px 16px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #2a2a2a;
            z-index: 10;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: none;
            border: none;
            color: #b0b0b0;
            font-size: 24px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .tool-btn:hover:not(:disabled) {
            background-color: #2a2a2a;
            color: #ffffff;
        }

        .tool-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            width: 260px;
            background-color: #141414;
            border-right: 1px solid #2a2a2a;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            z-index: 5;
        }

        .panel-section {
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 16px;
        }

        .panel-section h3 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: #cccccc;
            letter-spacing: 0.5px;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            color: #aaa;
        }

        select, input[type="color"], input[type="number"] {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 6px 8px;
            border-radius: 6px;
            width: 100%;
            font-size: 13px;
        }

        .shape-type-buttons {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .shape-type-btn {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #ccc;
            padding: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            font-size: 18px;
        }

        .shape-type-btn.active {
            background-color: #3a6ea5;
            border-color: #5a8ec5;
            color: white;
        }

        .status-text {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 16px;
            font-style: italic;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 6px;
        }

        .canvas-container-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a;
            position: relative;
            overflow: auto;
        }

        .canvas-wrapper {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: inline-block;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .placeholder-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            background-color: #2a2a2a;
            color: #555;
            font-size: 48px;
            font-weight: 100;
            border: 2px dashed #444;
            cursor: pointer;
            z-index: 10;
            flex-direction: column;
            gap: 10px;
        }

        .placeholder-overlay:hover {
            background-color: #3a3a3a;
            color: #777;
        }

        .placeholder-overlay small {
            font-size: 14px;
        }

        .has-image .placeholder-overlay {
            display: none;
        }

        .download-btn {
            background-color: #2a6e3a;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .download-btn:hover:not(:disabled) {
            background-color: #3a8e4a;
        }

        .error-state {
            border: 2px solid #ff4444 !important;
            background-color: #441111 !important;
        }

        .error-message {
            background-color: #ff4444;
            color: white;
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 8px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .left-panel {
                width: 220px;
            }
            .tool-btn {
                font-size: 18px;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="tool-btn" id="tool-text" title="Agregar texto (T)">📝 Texto</button>
    <button class="tool-btn" id="tool-shape" title="Agregar forma">⬛ Forma</button>
    <button class="tool-btn" id="tool-bg" title="Color de fondo sólido">🎨 Fondo</button>
    <button class="tool-btn" id="tool-preset" title="Presets de tamaño">📏 Tamaño</button>
    <button class="tool-btn download-btn" id="tool-download" title="Descargar PNG">💾 Descargar</button>
</div>

<div class="main-layout">
    <div class="left-panel" id="left-panel">
        <div class="panel-section">
            <h3>📝 Texto</h3>
            <div class="control-group">
                <label>Fuente</label>
                <select id="font-family">
                    <option value="Arial">Arial</option>
                    <option value="Helvetica">Helvetica</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Impact">Impact</option>
                    <option value="Comic Sans MS">Comic Sans MS</option>
                </select>
            </div>
            <div class="control-group">
                <label>Tamaño (px)</label>
                <input type="number" id="font-size" value="48" min="12" max="200" step="2">
            </div>
            <div class="control-group">
                <label>Color</label>
                <input type="color" id="text-color" value="#ffffff">
            </div>
            <div class="control-group">
                <label>Alineación</label>
                <select id="text-align">
                    <option value="left">Izquierda</option>
                    <option value="center">Centro</option>
                    <option value="right">Derecha</option>
                </select>
            </div>
        </div>

        <div class="panel-section">
            <h3>🔷 Forma</h3>
            <div class="control-group">
                <label>Tipo</label>
                <div class="shape-type-buttons" id="shape-type-selector">
                    <div class="shape-type-btn active" data-shape="rect">■ Rect</div>
                    <div class="shape-type-btn" data-shape="circle">● Circ</div>
                    <div class="shape-type-btn" data-shape="triangle">▲ Tri</div>
                </div>
            </div>
            <div class="control-group">
                <label>Relleno</label>
                <input type="color" id="shape-fill" value="#ff5555">
            </div>
            <div class="control-group">
                <label>Borde</label>
                <input type="color" id="stroke-color" value="#ffffff">
            </div>
            <div class="control-group">
                <label>Grosor borde (px)</label>
                <input type="number" id="stroke-width" value="3" min="1" max="15">
            </div>
        </div>

        <div class="panel-section">
            <h3>🎨 Fondo Lienzo</h3>
            <div class="control-group">
                <input type="color" id="canvas-bg-color" value="#2a2a2a">
                <button id="apply-bg-btn" style="margin-top:8px; width:100%; background:#2a2a2a; border:1px solid #3a3a3a; color:white; padding:6px; border-radius:6px; cursor:pointer;">Aplicar fondo</button>
            </div>
        </div>
        <div class="status-text" id="status-msg">
            🔄 Estado: INICIALIZANDO...
        </div>
    </div>

    <div class="canvas-container-wrapper" id="canvas-container">
        <div class="canvas-wrapper" id="canvas-wrapper">
            <canvas id="canvas" width="800" height="450"></canvas>
            <div class="placeholder-overlay" id="placeholder">+ Click para agregar imagen</div>
        </div>
    </div>
</div>

<script>
    // ==================== MÁQUINA DE ESTADOS ====================
    const StateMachine = {
        // Estados posibles
        STATES: {
            INIT: 'INITIALIZANDO',
            READY: 'LISTO_SIN_IMAGEN',
            EDITING: 'EDITANDO_CON_IMAGEN',
            ERROR: 'ERROR'
        },
        
        // Estado actual
        currentState: null,
        
        // Referencias
        canvas: null,
        currentSelectedObject: null,
        hasImage: false,
        currentShapeType: 'rect',
        
        // Elementos UI
        elements: {
            textBtn: null,
            shapeBtn: null,
            bgBtn: null,
            presetBtn: null,
            downloadBtn: null,
            statusMsg: null,
            canvasWrapper: null,
            placeholder: null,
            controls: {}
        },
        
        // Inicializar máquina de estados
        init(canvasInstance) {
            this.canvas = canvasInstance;
            this.cacheElements();
            this.bindEvents();
            this.transitionTo(this.STATES.INIT);
            
            // Verificar Fabric.js
            if (typeof fabric === 'undefined') {
                this.transitionTo(this.STATES.ERROR, 'Fabric.js no se cargó correctamente');
                return false;
            }
            
            // Configurar canvas
            try {
                this.canvas.setBackgroundColor('#2a2a2a', () => this.canvas.renderAll());
                this.setupCanvasEvents();
                this.transitionTo(this.STATES.READY);
                return true;
            } catch (error) {
                this.transitionTo(this.STATES.ERROR, `Error al inicializar canvas: ${error.message}`);
                return false;
            }
        },
        
        cacheElements() {
            this.elements.textBtn = document.getElementById('tool-text');
            this.elements.shapeBtn = document.getElementById('tool-shape');
            this.elements.bgBtn = document.getElementById('tool-bg');
            this.elements.presetBtn = document.getElementById('tool-preset');
            this.elements.downloadBtn = document.getElementById('tool-download');
            this.elements.statusMsg = document.getElementById('status-msg');
            this.elements.canvasWrapper = document.getElementById('canvas-wrapper');
            this.elements.placeholder = document.getElementById('placeholder');
            
            // Cache de controles
            this.elements.controls.fontFamily = document.getElementById('font-family');
            this.elements.controls.fontSize = document.getElementById('font-size');
            this.elements.controls.textColor = document.getElementById('text-color');
            this.elements.controls.textAlign = document.getElementById('text-align');
            this.elements.controls.shapeFill = document.getElementById('shape-fill');
            this.elements.controls.strokeColor = document.getElementById('stroke-color');
            this.elements.controls.strokeWidth = document.getElementById('stroke-width');
            this.elements.controls.canvasBg = document.getElementById('canvas-bg-color');
            this.elements.controls.applyBg = document.getElementById('apply-bg-btn');
        },
        
        bindEvents() {
            // Botones principales
            this.elements.textBtn.addEventListener('click', () => this.handleAddText());
            this.elements.shapeBtn.addEventListener('click', () => this.handleAddShape());
            this.elements.bgBtn.addEventListener('click', () => this.handleBgColor());
            this.elements.presetBtn.addEventListener('click', () => this.handlePreset());
            this.elements.downloadBtn.addEventListener('click', () => this.handleDownload());
            this.elements.controls.applyBg.addEventListener('click', () => this.applyBackground());
            
            // Placeholder
            this.elements.placeholder.addEventListener('click', () => this.handleAddImage());
            
            // Drag & drop
            const container = document.getElementById('canvas-container');
            container.addEventListener('dragover', (e) => e.preventDefault());
            container.addEventListener('drop', (e) => this.handleDrop(e));
            
            // Shape type selector
            document.querySelectorAll('.shape-type-btn').forEach(btn => {
                btn.addEventListener('click', () => this.handleShapeTypeChange(btn));
            });
            
            // Controles de edición
            this.elements.controls.fontFamily.addEventListener('change', () => this.updateTextProperty('fontFamily'));
            this.elements.controls.fontSize.addEventListener('change', () => this.updateTextProperty('fontSize'));
            this.elements.controls.textColor.addEventListener('change', () => this.updateTextProperty('fill'));
            this.elements.controls.textAlign.addEventListener('change', () => this.updateTextProperty('textAlign'));
            this.elements.controls.shapeFill.addEventListener('change', () => this.updateShapeProperty('fill'));
            this.elements.controls.strokeColor.addEventListener('change', () => this.updateShapeProperty('stroke'));
            this.elements.controls.strokeWidth.addEventListener('change', () => this.updateShapeProperty('strokeWidth'));
            
            // Teclado
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Delete') this.handleDelete();
                if (e.ctrlKey && e.key === 'z') e.preventDefault();
            });
        },
        
        setupCanvasEvents() {
            this.canvas.on('selection:created', (e) => this.handleSelection(e.selected[0]));
            this.canvas.on('selection:updated', (e) => this.handleSelection(e.selected[0]));
            this.canvas.on('selection:cleared', () => this.handleSelection(null));
            
            // Zoom
            this.canvas.on('mouse:wheel', (opt) => {
                if (this.currentState === this.STATES.ERROR) return;
                const delta = opt.e.deltaY;
                let zoom = this.canvas.getZoom();
                zoom *= 0.999 ** delta;
                if (zoom > 5) zoom = 5;
                if (zoom < 0.2) zoom = 0.2;
                this.canvas.setZoom(zoom);
                opt.e.preventDefault();
                opt.e.stopPropagation();
            });
        },
        
        // ============ TRANSICIONES DE ESTADO ============
        transitionTo(newState, errorMessage = null) {
            const oldState = this.currentState;
            this.currentState = newState;
            
            console.log(`Estado: ${oldState} → ${newState}`);
            
            // Actualizar UI según estado
            this.updateUIForState();
            
            // Mostrar mensaje de error si existe
            if (newState === this.STATES.ERROR && errorMessage) {
                this.showError(errorMessage);
            }
            
            // Actualizar mensaje de estado
            this.updateStatusMessage();
        },
        
        updateUIForState() {
            const isError = this.currentState === this.STATES.ERROR;
            const isReady = this.currentState === this.STATES.READY;
            const isEditing = this.currentState === this.STATES.EDITING;
            const canEdit = isEditing || (isReady && this.hasImage);
            
            // Habilitar/deshabilitar botones según estado
            const buttons = [this.elements.textBtn, this.elements.shapeBtn];
            buttons.forEach(btn => {
                if (btn) btn.disabled = !canEdit || isError;
            });
            
            // El botón de descarga solo si hay contenido
            if (this.elements.downloadBtn) {
                const hasContent = this.canvas && this.canvas.getObjects().length > 0;
                this.elements.downloadBtn.disabled = isError || (!hasContent && !this.hasImage);
            }
            
            // Mostrar/ocultar placeholder
            if (this.elements.canvasWrapper && this.elements.placeholder) {
                if (this.hasImage && !isError) {
                    this.elements.canvasWrapper.classList.add('has-image');
                } else {
                    this.elements.canvasWrapper.classList.remove('has-image');
                }
            }
            
            // Marcar error visualmente
            if (isError) {
                document.body.classList.add('error-state');
            } else {
                document.body.classList.remove('error-state');
            }
        },
        
        updateStatusMessage() {
            let message = '';
            switch(this.currentState) {
                case this.STATES.INIT:
                    message = '🔄 INICIALIZANDO... Cargando componentes';
                    break;
                case this.STATES.READY:
                    message = '✅ LISTO | Haz click en el + para agregar una imagen';
                    break;
                case this.STATES.EDITING:
                    message = `✏️ EDITANDO | ${this.hasImage ? 'Con imagen' : 'Sin imagen'} | Selecciona elementos para editar`;
                    break;
                case this.STATES.ERROR:
                    message = '❌ ERROR | La aplicación no funciona correctamente';
                    break;
                default:
                    message = 'Estado desconocido';
            }
            
            if (this.elements.statusMsg) {
                this.elements.statusMsg.innerHTML = message;
            }
        },
        
        showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `❌ ${message}`;
            document.body.appendChild(errorDiv);
            
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        },
        
        // ============ HANDLERS DE ACCIONES ============
        handleAddImage() {
            if (this.currentState === this.STATES.ERROR) {
                this.showError('No se puede agregar imagen en estado de error');
                return;
            }
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    this.addImageFromFile(e.target.files[0]);
                }
            };
            input.click();
        },
        
        addImageFromFile(file) {
            if (this.currentState === this.STATES.ERROR) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                fabric.Image.fromURL(event.target.result, (img) => {
                    try {
                        const maxWidth = this.canvas.width * 0.9;
                        const maxHeight = this.canvas.height * 0.9;
                        let scale = 1;
                        if (img.width > maxWidth) scale = maxWidth / img.width;
                        if (img.height * scale > maxHeight) scale = maxHeight / img.height;
                        img.scale(scale);
                        img.set({
                            left: (this.canvas.width - img.width * scale) / 2,
                            top: (this.canvas.height - img.height * scale) / 2,
                            selectable: true,
                            hasControls: true,
                            hasBorders: true
                        });
                        this.canvas.add(img);
                        this.canvas.setActiveObject(img);
                        this.hasImage = true;
                        
                        // Transición a EDITING si estaba en READY
                        if (this.currentState === this.STATES.READY) {
                            this.transitionTo(this.STATES.EDITING);
                        }
                        
                        this.canvas.renderAll();
                        this.updateUIForState();
                        this.handleSelection(img);
                    } catch (error) {
                        this.transitionTo(this.STATES.ERROR, `Error al cargar imagen: ${error.message}`);
                    }
                });
            };
            reader.readAsDataURL(file);
        },
        
        handleDrop(e) {
            if (this.currentState === this.STATES.ERROR) return;
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                this.addImageFromFile(file);
            }
        },
        
        handleAddText() {
            if (this.currentState !== this.STATES.EDITING && !this.hasImage) {
                this.showError('Primero agrega una imagen de fondo');
                return;
            }
            
            try {
                const text = new fabric.IText('Texto', {
                    left: this.canvas.width/2 - 50,
                    top: this.canvas.height/2 - 20,
                    fontFamily: this.elements.controls.fontFamily.value,
                    fontSize: parseInt(this.elements.controls.fontSize.value),
                    fill: this.elements.controls.textColor.value,
                    textAlign: this.elements.controls.textAlign.value,
                    hasControls: true,
                    padding: 5
                });
                this.canvas.add(text);
                this.canvas.setActiveObject(text);
                this.canvas.renderAll();
                this.handleSelection(text);
            } catch (error) {
                this.transitionTo(this.STATES.ERROR, `Error al agregar texto: ${error.message}`);
            }
        },
        
        handleAddShape() {
            if (this.currentState !== this.STATES.EDITING && !this.hasImage) {
                this.showError('Primero agrega una imagen de fondo');
                return;
            }
            
            try {
                const fill = this.elements.controls.shapeFill.value;
                const stroke = this.elements.controls.strokeColor.value;
                const strokeWidth = parseInt(this.elements.controls.strokeWidth.value);
                const shape = this.createShape(this.currentShapeType, this.canvas.width/2, this.canvas.height/2, fill, stroke, strokeWidth);
                this.canvas.add(shape);
                this.canvas.setActiveObject(shape);
                this.canvas.renderAll();
                this.handleSelection(shape);
            } catch (error) {
                this.transitionTo(this.STATES.ERROR, `Error al agregar forma: ${error.message}`);
            }
        },
        
        createShape(type, left, top, fill, stroke, strokeWidth) {
            const size = 80;
            switch(type) {
                case 'rect':
                    return new fabric.Rect({
                        width: size, height: size, fill: fill, stroke: stroke, strokeWidth: strokeWidth,
                        left: left, top: top, originX: 'center', originY: 'center', customType: 'shape'
                    });
                case 'circle':
                    return new fabric.Circle({
                        radius: size/2, fill: fill, stroke: stroke, strokeWidth: strokeWidth,
                        left: left, top: top, originX: 'center', originY: 'center', customType: 'shape'
                    });
                case 'triangle':
                    return new fabric.Triangle({
                        width: size, height: size, fill: fill, stroke: stroke, strokeWidth: strokeWidth,
                        left: left, top: top, originX: 'center', originY: 'center', customType: 'shape'
                    });
                default:
                    return new fabric.Rect({
                        width: size, height: size, fill: fill, stroke: stroke, strokeWidth: strokeWidth,
                        left: left, top: top, originX: 'center', originY: 'center', customType: 'shape'
                    });
            }
        },
        
        replaceShape(oldShape) {
            const newShape = this.createShape(this.currentShapeType, oldShape.left, oldShape.top, 
                                            oldShape.fill, oldShape.stroke, oldShape.strokeWidth);
            this.canvas.remove(oldShape);
            this.canvas.add(newShape);
            this.canvas.setActiveObject(newShape);
            this.canvas.renderAll();
            this.handleSelection(newShape);
        },
        
        handleShapeTypeChange(btn) {
            document.querySelectorAll('.shape-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.currentShapeType = btn.getAttribute('data-shape');
            
            if (this.currentSelectedObject && this.currentSelectedObject.customType === 'shape') {
                this.replaceShape(this.currentSelectedObject);
            }
        },
        
        handleBgColor() {
            if (this.currentState === this.STATES.ERROR) return;
            // Solo abre el panel, la acción real está en applyBackground
        },
        
        applyBackground() {
            if (this.currentState === this.STATES.ERROR) return;
            try {
                const color = this.elements.controls.canvasBg.value;
                this.canvas.setBackgroundColor(color, () => this.canvas.renderAll());
            } catch (error) {
                this.transitionTo(this.STATES.ERROR, `Error al aplicar fondo: ${error.message}`);
            }
        },
        
        handlePreset() {
            if (this.currentState === this.STATES.ERROR) return;
            
            const preset = prompt("Elige preset:\n- YouTube (1280x720)\n- Twitter (1200x675)\n- Instagram (1080x1080)", "YouTube");
            if (!preset) return;
            
            let width, height;
            if (preset.toLowerCase().includes('youtube')) { 
                width = 1280; height = 720; 
            } else if (preset.toLowerCase().includes('twitter')) { 
                width = 1200; height = 675; 
            } else if (preset.toLowerCase().includes('instagram')) { 
                width = 1080; height = 1080; 
            } else { 
                this.showError('Preset no reconocido, usando YouTube'); 
                width = 1280; height = 720; 
            }
            
            try {
                this.canvas.setWidth(width);
                this.canvas.setHeight(height);
                this.canvas.renderAll();
            } catch (error) {
                this.transitionTo(this.STATES.ERROR, `Error al cambiar tamaño: ${error.message}`);
            }
        },
        
        handleDownload() {
            if (this.currentState === this.STATES.ERROR) return;
            
            if (this.canvas.getObjects().length === 0 && !this.hasImage) {
                this.showError('No hay nada para descargar');
                return;
            }
            
            try {
                const link = document.createElement('a');
                link.download = 'miniatura.png';
                link.href = this.canvas.toDataURL({ format: 'png', quality: 1 });
                link.click();
            } catch (error) {
                this.transitionTo(this.STATES.ERROR, `Error al descargar: ${error.message}`);
            }
        },
        
        handleSelection(obj) {
            this.currentSelectedObject = obj;
            
            if (!obj) {
                if (this.elements.statusMsg && this.currentState !== this.STATES.ERROR) {
                    this.elements.statusMsg.innerHTML = `✏️ EDITANDO | ${this.hasImage ? 'Con imagen' : 'Sin imagen'} | Haz click en un elemento para editarlo`;
                }
                return;
            }
            
            // Actualizar controles según tipo de objeto
            if (obj.type === 'i-text' || obj.type === 'text') {
                this.elements.controls.fontFamily.value = obj.fontFamily || 'Arial';
                this.elements.controls.fontSize.value = obj.fontSize || 48;
                this.elements.controls.textColor.value = obj.fill || '#ffffff';
                this.elements.controls.textAlign.value = obj.textAlign || 'center';
            } else if (obj.customType === 'shape') {
                this.elements.controls.shapeFill.value = obj.fill || '#ff5555';
                this.elements.controls.strokeColor.value = obj.stroke || '#ffffff';
                this.elements.controls.strokeWidth.value = obj.strokeWidth || 3;
            }
        },
        
        updateTextProperty(property) {
            if (!this.currentSelectedObject) return;
            if (this.currentSelectedObject.type !== 'i-text' && this.currentSelectedObject.type !== 'text') return;
            if (this.currentState === this.STATES.ERROR) return;
            
            let value;
            switch(property) {
                case 'fontFamily':
                    value = this.elements.controls.fontFamily.value;
                    break;
                case 'fontSize':
                    value = parseInt(this.elements.controls.fontSize.value);
                    break;
                case 'fill':
                    value = this.elements.controls.textColor.value;
                    break;
                case 'textAlign':
                    value = this.elements.controls.textAlign.value;
                    break;
                default:
                    return;
            }
            
            try {
                this.currentSelectedObject.set(property, value);
                this.canvas.renderAll();
            } catch (error) {
                this.transitionTo(this.STATES.ERROR, `Error al actualizar texto: ${error.message}`);
            }
        },
        
        updateShapeProperty(property) {
            if (!this.currentSelectedObject) return;
            if (this.currentSelectedObject.customType !== 'shape') return;
            if (this.currentState === this.STATES.ERROR) return;
            
            let value;
            switch(property) {
                case 'fill':
                    value = this.elements.controls.shapeFill.value;
                    break;
                case 'stroke':
                    value = this.elements.controls.strokeColor.value;
                    break;
                case 'strokeWidth':
                    value = parseInt(this.elements.controls.strokeWidth.value);
                    break;
                default:
                    return;
            }
            
            try {
                this.currentSelectedObject.set(property, value);
                this.canvas.renderAll();
            } catch (error) {
                this.transitionTo(this.STATES.ERROR, `Error al actualizar forma: ${error.message}`);
            }
        },
        
        handleDelete() {
            if (!this.currentSelectedObject) return;
            if (this.currentState === this.STATES.ERROR) return;
            
            try {
                const wasImage = this.currentSelectedObject.type === 'image';
                this.canvas.remove(this.currentSelectedObject);
                
                if (wasImage) {
                    const remainingImages = this.canvas.getObjects().filter(obj => obj.type === 'image');
                    this.hasImage = remainingImages.length > 0;
                    
                    if (!this.hasImage && this.currentState === this.STATES.EDITING) {
                        this.transitionTo(this.STATES.READY);
                    }
                }
                
                this.canvas.renderAll();
                this.handleSelection(null);
            } catch (error) {
                this.transitionTo(this.STATES.ERROR, `Error al eliminar: ${error.message}`);
            }
        }
    };
    
    // ==================== INICIALIZACIÓN ====================
    document.addEventListener('DOMContentLoaded', () => {
        // Verificar Fabric.js
        if (typeof fabric === 'undefined') {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = '❌ Error crítico: Fabric.js no se cargó. Recarga la página.';
            document.body.appendChild(errorDiv);
            return;
        }
        
        // Crear canvas
        const canvasElement = document.getElementById('canvas');
        if (!canvasElement) {
            console.error('Canvas no encontrado');
            return;
        }
        
        const canvas = new fabric.Canvas('canvas');
        
        // Inicializar máquina de estados
        const success = StateMachine.init(canvas);
        
        if (!success) {
            console.error('Failed to initialize StateMachine');
        }
    });
</script>
</body>
</html>
